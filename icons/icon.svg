<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1B1A1C"/>

  <!-- Quilt layout (view-quilt-outline style), 76px padding, 16px gaps -->
  <!-- Grid: 3 cols × 3 rows, col widths ~113px, row heights ~113px -->

  <!-- Large tile: top-left, spans 2×2 -->
  <rect x="76" y="76" width="242" height="242" rx="18" fill="#2E7D5E"/>

  <!-- Right tall tile: spans 2 rows (merged top-right + mid-right) -->
  <rect x="334" y="76" width="102" height="242" rx="14" fill="#3E9E74" opacity=".55"/>

  <!-- Bottom long tile: spans full width (merged all 3 bottom tiles) -->
  <rect x="76" y="334" width="360" height="102" rx="14" fill="#3E9E74" opacity=".45"/>
</svg>
